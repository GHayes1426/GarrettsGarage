<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
        <style>
        :root {
          --red: #C8102E;
          --red-dark: #9B0C23;
          --red-glow: rgba(200,16,46,0.25);
          --black: #080808;
          --surface: #131313;
          --surface2: #1C1C1C;
          --border: #2A2A2A;
          --text: #F0F0F0;
          --text-muted: #888;
          --white: #FFFFFF;
        }
            
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            
        html { scroll-behavior: smooth; }

        body {
          background: var(--black);
          color: var(--text);
          font-family: 'Barlow', sans-serif;
          margin: 0;
          position: relative;
        }

        body::before {
          content: '';
          position: fixed;
          top: 70px;
          left: 0;
          right: 0;
          bottom: 0;

          background:
            repeating-linear-gradient(
              -45deg,
              transparent,
              transparent 70px,
              rgba(200,16,46,.28) 70px,
              rgba(200,16,46,.28) 72px
            );

          mask-image: linear-gradient(
            to bottom,
            rgba(0,0,0,1) 0%,
            rgba(0,0,0,.85) 25%,
            rgba(0,0,0,.45) 60%,
            rgba(0,0,0,0) 100%
          );

          pointer-events: none;
          z-index: 0;
        }
            
        body::after {
          content: '';
          position: fixed;
          top: 70px; /* starts below navbar */
          left: 0;
          right: 0;
          height: 800px;

          background:
            linear-gradient(
              to bottom,
              rgba(200,16,46,0.28) 0%,
              rgba(200,16,46,0.12) 30%,
              rgba(200,16,46,0.04) 60%,
              transparent 100%
            );

          pointer-events: none;
          z-index: 0;
        }
            
        nav {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          z-index: 1000;
          background: #000;
          border-bottom: 1px solid var(--border);
          height: clamp(70px, 8vw, 80px);
          margin: 0;
          border-top: none;
        }
        
        .nav-home {
          display: flex;
          align-items: center;

          padding: 10px 22px;

          border: 1px solid var(--border);
          border-radius: 4px;

          color: var(--text);
          text-decoration: none;

          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 700;
          text-transform: uppercase;

          transition: 0.25s ease;
        }

        .nav-home:hover {
          border-color: var(--red);
          color: var(--red);
        }

        .nav-inner {
          max-width: 1280px;
          width: 100%;
          height: 100%;
          margin: 0 auto;
          padding: 0 20px;
          display: flex;
          align-items: center;
        }
            
        .nav-logo {
          display: flex;
          align-items: center;
          height: 100%;
          flex-shrink: 0;
          margin-right: clamp(24px, 4vw, 64px);
        }

        .nav-logo img {
          height: clamp(30px, 4vw, 48px);
          width: auto;
          display: block;
        }

        .nav-links {
          display: flex;
          gap: clamp(16px, 2vw, 36px);
          list-style: none;
          flex: 1;
          justify-content: flex-start;
        }
            
        .nav-links a {
          color: var(--text-muted);
          text-decoration: none;
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 600;
          font-size: clamp(8px, 2vw, 20px);
          letter-spacing: 0.08em;
          text-transform: uppercase;
          transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--red); }

        .nav-links a.active {
          color: var(--red);
        }

        .nav-right {
          margin-left: auto;
          display: flex;
          align-items: center;
          gap: 16px;
        }
            
        .nav-cta {
          background: var(--red);
          color: var(--white);
          padding: 9px 22px;
          border-radius: 3px;
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 700;
          font-size: 15px;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          text-decoration: none;
          transition: background 0.2s;
        }
            
        .nav-cta:hover {
          background: var(--red-dark);
        }

        .container {
          max-width: 1280px;
          margin: 0 auto;
          padding: 0 32px;
        }

        .section-label {
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 700;
          letter-spacing: 0.25em;
          text-transform: uppercase;
          color: var(--text);
          margin-bottom: 16px;
          padding-top: 0;
        }
            
        .page-hero {
          padding: 10px 0 100px;
          position: relative;
          overflow: hidden;
          background: transparent;
        }
            
        .page-hero .container {
          position: relative;
          z-index: 1;
        }

        #services {
          position: relative;
          overflow: hidden;
          padding-top: 0;
          margin-top: 0;
          padding-top: calc(var(--nav-height) + 20px);
        }
            
        #services .container { 
          position: relative;
          z-index: 1;
        }

        .page-hero .container {
          position: relative;
          z-index: 2;
        }
            
        .page-hero h1 {
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 900;
          font-size: clamp(48px, 7vw, 80px);
          line-height: 0.95;
          text-transform: uppercase;
          color: var(--white);
          margin-bottom: 20px;
        }

        .page-hero h1 span {
          color: var(--red);
        }

        .page-hero p {
          max-width: 650px;
          color: var(--text-muted);
          font-size: 18px;
          line-height: 1.7;
          margin-bottom: 32px;
        }

        .section-title {
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 900;
          font-size: clamp(36px, 5vw, 56px);
          text-transform: uppercase;
          line-height: 1;
          margin-bottom: 16px;
        }

        .section-title span {
          color: var(--red);
        }

        .section-desc {
          color: var(--text);
          max-width: 700px;
          margin-bottom: 40px;
        }

        .btn-primary {
          display: inline-block;
          background: var(--red);
          color: white;
          text-decoration: none;
          padding: 12px 28px;
          border-radius: 4px;
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 700;
          text-transform: uppercase;
        }
            
        .service-category {
          margin-bottom: 80px;
        }

        .service-category h2 {
          font-family: 'Barlow Condensed', sans-serif;
          font-size: clamp(28px, 4vw, 42px);
          text-transform: uppercase;
          margin-bottom: 24px;
        }

        .service-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
          gap: 20px;
        }

        .service-item {
          position: relative;
          overflow: hidden;

          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 4px;

          padding: 28px;

          transition:
            transform .25s ease,
            border-color .25s ease,
            box-shadow .25s ease;
        }

        .service-item::before {
          content: '';

          position: absolute;
          top: 0;
          left: 0;

          width: 4px;
          height: 100%;

          background: var(--red);

          transition: width .3s ease;
        }

        .service-item:hover {
          transform: translateY(-6px);

          border-color: var(--red);

          box-shadow:
            0 12px 30px rgba(200,16,46,.15);
        }

        .service-item:hover::before {
          width: 100%;
          opacity: .08;
        }

        .service-item h3 {
          margin-bottom: 10px;
          color: var(--white);
        }

        .service-item p {
          color: var(--text-muted);
        }

        .service-cta {
          background: var(--surface);
          text-align: center;
        }
            
        /* ── SERVICES ── */
          .filter-bar {
            display: flex; gap: 8px; flex-wrap: wrap;
            margin-bottom: 40px;
          }
          .filter-btn {
            padding: 8px 20px;
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-muted); cursor: pointer;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700; font-size: 14px; letter-spacing: 0.1em;
            text-transform: uppercase; border-radius: 2px;
            transition: all 0.2s;
          }
          .filter-btn:hover, .filter-btn.active {
            background: var(--red); border-color: var(--red); color: var(--white);
          }
          .services-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
          }
          .service-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 4px; overflow: hidden;
            transition: all 0.25s; cursor: default;
            position: relative;
          }
          .service-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 3px; background: var(--red); transform: scaleX(0);
            transform-origin: left; transition: transform 0.25s;
          }
          .service-card:hover { border-color: var(--red); transform: translateY(-4px); box-shadow: 0 16px 40px rgba(200,16,46,0.15); }
          .service-card:hover::before { transform: scaleX(1); }
          .service-card-body { padding: 28px; }
          .service-cat {
            font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
            color: var(--red); font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700; margin-bottom: 10px;
          }
          .service-card h3 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800; font-size: 22px; text-transform: uppercase;
            color: var(--white); margin-bottom: 10px;
          }
          .service-card p { color: var(--text-muted); font-size: 14px; line-height: 1.7; margin-bottom: 16px; }
          .service-price {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700; font-size: 20px; color: var(--white);
          }
          .service-price span { font-size: 13px; color: var(--text-muted); font-weight: 400; }
          .service-icon-wrap {
            width: 44px; height: 44px;
            background: rgba(200,16,46,0.12); border: 1px solid rgba(200,16,46,0.25);
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            font-size: 22px; margin-bottom: 20px;
          }
            
          /* Mobile Burger */

        .burger {
          width: 32px;
          height: 24px;
          position: relative;
          z-index: 1002;
          display: none;
          flex-direction: column;
          justify-content: space-between;
          margin-left: auto;
          background: none;
          border: none;
          cursor: pointer;
        }

        .burger span {
          display: block;
          width: 100%;
          height: 3px;
          background: white;
          border-radius: 3px;
          transition: all 0.3s ease;
        }

        .burger.open span:nth-child(1) {
          transform: translateY(10.8px) rotate(45deg);
        }

        .burger.open span:nth-child(2) {
          opacity: 0;
        }

        .burger.open span:nth-child(3) {
          transform: translateY(-10.8px) rotate(-45deg);
        }

        /* Mobile Menu */

        .mobile-menu {
          position: fixed;
          top: var(--nav-height);
          left: 0;
          right: 0;
          height: 48px;
          display: flex;
          flex-direction: row;
          background: #56000e;
          z-index: 999;
          overflow: hidden;
          max-height: 0;
          opacity: 0;
          transition:
            max-height 0.3s ease,
            opacity 0.3s ease;
        }

        .mobile-menu.open {
          max-height: 48px;
          opacity: 1;
        }

        .mobile-menu a {
          flex: 1;
          padding: 12px 6px;
          color: white;
          text-decoration: none;
          text-align: center;
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 700;
          text-transform: uppercase;
          border: 1px solid #000;
          transition: background 0.25s ease;
        }

        .mobile-menu a:last-child {
          border-right: none;
        }

        .mobile-menu a:hover {
          background: #991229;
        }

        /* Floating Book Service Button */

        .floating-book-btn {
          position: fixed;
          top: calc(var(--nav-height) + 48px);
          right: 0;
          z-index: 998;

          display: flex;
          align-items: center;
          justify-content: center;

          min-height: 48px;
          padding: 12px 22px;

          background: var(--red);
          color: #fff;
          text-decoration: none;

          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 700;
          font-size: 15px;
          letter-spacing: 0.08em;
          text-transform: uppercase;

          border: 1px solid rgba(255,255,255,0.15);
          border-top: none;
          border-radius: 0 0 4px 4px;

          box-shadow: 0 4px 12px rgba(0,0,0,.3);

          transition:
            top 0.3s ease,
            right 0.3s ease,
            background 0.25s ease,
            transform 0.25s ease;
        }

        .floating-book-btn:hover {
          background: var(--white);
          border-color: var(--red-dark);
          color: var(--red);
        }

        @media (max-width: 800px) {
          nav .nav-links {
            display: none;
          }

          .burger {
            display: flex;
          }
        }
        </style>
    </head>
<body>

<nav>
  <div class="nav-inner">

    <a href="index.html" class="nav-logo">
      <img src="images/banner.png" alt="Garrett's Garage">
    </a>

    <ul class="nav-links">
      <li><a href="/index.html#home">About</a></li>
      <li><a href="/services.html" class="active">Services</a></li>
      <li><a href="/index.html#reviews">Reviews</a></li>
      <li><a href="/index.html#jobs">Completed Jobs</a></li>
      <li><a href="/index.html#contact">Contact</a></li>
    </ul>

    <button class="burger" id="burger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</nav>
  
<a href="#schedule" class="floating-book-btn">
    Book Service
</a>

<div class="mobile-menu" id="mobileMenu">
  <a href="/index.html#home">About</a>
  <a href="/services.html" class="active">Services</a>
  <a href="/index.html#jobs">Past jobs</a>
  <a href="/index.html#reviews">Reviews</a>
  <a href="/index.html#contact">Contact</a>
</div>
    
<!-- SERVICES -->
<section id="services">
  <div class="container">
    <div class="section-label">What We Offer</div>
    <div class="section-title">Our <span>Services</span></div>
    <p class="section-desc">Specialized Honda and Acura service at honest prices. Filter by category to find exactly what you need.</p>

    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">All Services</button>
      <button class="filter-btn" data-filter="maintenance">Maintenance</button>
      <button class="filter-btn" data-filter="engine">Engine</button>
      <button class="filter-btn" data-filter="brakes">Brakes & Suspension</button>
      <button class="filter-btn" data-filter="transmission">Transmission</button>
      <button class="filter-btn" data-filter="electrical">Electrical</button>
      <button class="filter-btn" data-filter="ac">A/C & Heating</button>
    </div>

    <div class="services-grid" id="servicesGrid">
    </div>
  </div>
</section>
<script>
const services = [
  { cat: 'maintenance', icon: '🛢️', name: 'Oil Change & Filter', desc: 'Full synthetic or conventional oil change with filter replacement and multi-point inspection.', price: 'From $100', priceNote: '/visit' },
  { cat: 'maintenance', icon: '🔍', name: 'Multi-Point Inspection', desc: 'Comprehensive inspection covering brakes, fluids, belts, hoses, and more.', price: 'Free', priceNote: ' with service' },
  { cat: 'engine', icon: '🔧', name: 'Engine Diagnostics', desc: 'Computer scan plus hands-on diagnosis to identify the root cause of check engine lights or unusual symptoms.', price: 'From $100', priceNote: '/diagnostic' },
  { cat: 'engine', icon: '⚡', name: 'Timing Belt Package', desc: 'Factory-spec timing belt replacement with tensioners.', price: 'From $1300', priceNote: '/job' },
  { cat: 'engine', icon: '⛓️', name: 'Timing Chain Package', desc: 'Factory-spec chain replacement with tensioners. VTC Actuator', price: 'From $1400', priceNote: '/job' },
  { cat: 'engine', icon: '🌀', name: 'Head Gasket Repair', desc: 'Full head gasket replacement with warpage inspection. Guaranteed work.', price: 'From $2500', priceNote: '/without ARP Head Studs' },
  { cat: 'brakes', icon: '🛑', name: 'Brake Pad & Rotor Replacement', desc: 'OEM-quality pads and rotors for peak stopping power with hardware kit and brake dust check.', price: 'From $350', priceNote: '/axle' },
  { cat: 'brakes', icon: '🔩', name: 'Suspension & Struts', desc: 'Shocks, struts, control arms, handle vibration and uneven wear before it gets worse.', price: 'From $900', priceNote: '/corner' },
  { cat: 'transmission', icon: '⚙️', name: 'Transmission Service', desc: 'Fluid drain and fill. CVT, ATF, MTF', price: 'From $170', priceNote: '/service' },
  { cat: 'ac', icon: '❄️', name: 'R-134a A/C Services', desc: 'Refrigerant recharge with leak inspection to get your cabin cool again.', price: 'From $180', priceNote: '/must pass full AC System Vacuum Test' }
];

// ── RENDER SERVICES ──
function renderServices(filter = 'all') {
  const grid = document.getElementById('servicesGrid');
  const filtered = filter === 'all' ? services : services.filter(s => s.cat === filter);
  grid.innerHTML = filtered.map(s => `
    <div class="service-card" data-cat="${s.cat}">
      <div class="service-card-body">
        <div class="service-icon-wrap">${s.icon}</div>
        <div class="service-cat">${s.cat.toUpperCase()}</div>
        <h3>${s.name}</h3>
        <p>${s.desc}</p>
        <div class="service-price">${s.price} <span>${s.priceNote}</span></div>
      </div>
    </div>
  `).join('');
}
    
function updateNavOffsets() {
  const nav = document.querySelector('nav');
  const menu = document.getElementById('mobileMenu');
  const bookBtn = document.querySelector('.floating-book-btn');

  const navHeight = nav.getBoundingClientRect().height;

  document.documentElement.style.setProperty(
    '--nav-height',
    `${navHeight}px`
  );

  const menuHeight =
    menu.classList.contains('open')
      ? menu.getBoundingClientRect().height
      : 0;

  bookBtn.style.top = `${navHeight + menuHeight}px`;
}

window.addEventListener('load', updateNavOffsets);
window.addEventListener('resize', updateNavOffsets);
    
// ── FILTER LOGIC ──
document.getElementById('filterBar').addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderServices(e.target.dataset.filter);
  }
});
    
function toggleMenu() {
  const menu = document.getElementById('mobileMenu');
  const burger = document.getElementById('burger');

  menu.classList.toggle('open');
  burger.classList.toggle('open');

  updateNavOffsets();
}
    
renderServices();
</script>
</body>
</html>
