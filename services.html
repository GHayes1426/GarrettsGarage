    <body>
        <nav>
            <div class="nav-inner">
                <a href="index.html" class="nav-logo">
                    <img src="images/banner.png" alt="Garrett's Garage" />
                </a>

                <ul class="nav-links">
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="javascript:void(0)" class="active">Services</a></li>
                    <li><a href="reviews.html">Reviews</a></li>

                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>

        <a href="index.html#schedule" class="floating-book-btn"> Book Service </a>

        <div class="mobile-menu" id="mobileMenu">

            <a href="javascript:void(0)" class="active">Services</a>

            <a href="jobs.html">Past jobs</a>

        <!-- SERVICES -->
        <section id="services">
            <div class="container">
                <div class="section-label">What We Offer</div>
                <div class="section-title">Our <span>Services</span></div>
                <p class="section-desc">
                    Specialized Honda and Acura service at honest prices. Filter by category to find exactly what you
                    need.
                </p>

                <div class="filter-bar" id="filterBar">
                    <button class="filter-btn active" data-filter="all">All Services</button>
                    <button class="filter-btn" data-filter="maintenance">Maintenance</button>
                    <button class="filter-btn" data-filter="engine">Engine</button>
                    <button class="filter-btn" data-filter="brakes">Brakes & Suspension</button>
                    <button class="filter-btn" data-filter="transmission">Transmission</button>
                    <button class="filter-btn" data-filter="ac">A/C & Heating</button>
                </div>

                <div class="services-grid" id="servicesGrid"></div>
            </div>
        </section>
        <div class="modal-overlay" id="serviceModal" onclick="closeServiceModal()">
            <div class="modal" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h3 id="serviceModalTitle">Service Details</h3>
                    <button class="modal-close" onclick="closeServiceModal()">✕</button>
                </div>
                <div class="modal-body" id="serviceModalBody"></div>
            </div>
        </div>
