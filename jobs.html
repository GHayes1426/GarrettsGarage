<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Garrett's Garage | Completed Jobs</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap"
            rel="stylesheet" />
        <link rel="stylesheet" href="css/global.css" />
        <link rel="stylesheet" href="css/jobs.css" />
    </head>
    <body>
        <nav>
            <div class="nav-inner">
                <a href="index.html" class="nav-logo">
                    <img src="images/banner.png" alt="Garrett's Garage" />
                </a>

                <ul class="nav-links">
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="reviews.html">Reviews</a></li>
                    <li><a href="javascript:void(0)" class="active">Completed Jobs</a></li>
                    <li><a href="index.html#schedule">Contact</a></li>
                </ul>

                <button class="burger" id="burger" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>

        <a href="index.html#schedule" class="floating-book-btn"> Book Service </a>

        <div class="mobile-menu" id="mobileMenu">
            <a href="index.html#about">About</a>
            <a href="services.html">Services</a>
            <a href="reviews.html">Reviews</a>
            <a href="javascript:void(0)" class="active">Past jobs</a>
            <a href="index.html#schedule">Contact</a>
        </div>

        <!-- JOBS -->
        <section id="jobs">
            <div class="container">
                <div class="section-label">What We've Done</div>
                <div class="section-title">Completed&nbsp;<span>jobs</span></div>
                <p class="section-desc">Real repairs completed by our expert technicians.</p>

                <div class="jobs-controls">
                    <input type="text" id="jobSearch" placeholder="Search completed jobs..." class="jobs-search" />
                    <div class="filter-bar" id="filterBar">
                        <button class="filter-btn active" data-filter="all">All Jobs</button>
                        <button class="filter-btn" data-filter="Maintenance">Maintenance</button>
                        <button class="filter-btn" data-filter="Engine">Engine</button>
                        <button class="filter-btn" data-filter="Brakes & Suspension">Brakes & Suspension</button>
                        <button class="filter-btn" data-filter="Transmission">Transmission</button>
                        <button class="filter-btn" data-filter="A/C & Heating">A/C & Heating</button>
                    </div>
                </div>

                <div class="jobs-grid" id="jobsGrid"></div>
            </div>
        </section>
        <div class="modal-overlay" id="jobModal" onclick="closeModal()">
            <div class="modal" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h3 id="modalTitle">Job Details</h3>
                    <button class="modal-close" onclick="closeModal()">✕</button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
        <script src="js/data.js"></script>
        <script src="js/jobs.js"></script>
    </body>
</html>
