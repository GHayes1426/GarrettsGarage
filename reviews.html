<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Garrett's Garage | Reviews</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/reviews.css" />
  </head>
  <body>
    <nav>
      <div class="nav-inner">
        <a href="index.html" class="nav-logo">
          <img src="images/banner.png" alt="Garrett's Garage" />
        </a>

        <ul class="nav-links">
          <li><a href="index.html#about">About</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="javascript:void(0)" class="active">Reviews</a></li>
          <li><a href="jobs.html">Completed Jobs</a></li>
          <li><a href="index.html#schedule">Contact</a></li>
        </ul>

        <button class="burger" id="burger" onclick="toggleMenu()">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>

    <a href="index.html#schedule" class="floating-book-btn"> Book Service </a>

    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html#about">About</a>
      <a href="services.html">Services</a>
      <a href="javascript:void(0)" class="active">Reviews</a>
      <a href="jobs.html">Past jobs</a>
      <a href="index.html#schedule">Contact</a>
    </div>

    <!-- reviews -->
    <section id="reviews">
      <div class="container">
        <div class="section-label">What They're Saying</div>
        <div class="section-title">Our <span>Reviews</span></div>
        <p class="section-desc">See what our previous customers think about our professional services</p>
        <div class="reviews-content">
          <div class="review-controls">
            <div class="rating-filter" id="ratingFilter">
              <span class="filter-star" data-rating="1">★</span>
              <span class="filter-star" data-rating="2">★</span>
              <span class="filter-star" data-rating="3">★</span>
              <span class="filter-star" data-rating="4">★</span>
              <span class="filter-star" data-rating="5">★</span>
            </div>
            <input type="text" id="reviewSearch" placeholder="Search reviews..." class="review-search" />
          </div>
          <div class="reviews-grid" id="reviewsGrid"></div>
        </div>
      </div>
    </section>
    <div class="review-modal" id="reviewModal" onclick="closeReview()">
      <div class="review-modal-content" onclick="event.stopPropagation()">
        <button class="review-close" onclick="closeReview()">✕</button>

        <div class="review-header">
          <div class="modal-title-row">
            <h3 id="modalName"></h3>
            <div id="modalVehicle" class="modal-vehicle"></div>
          </div>

          <div id="modalStars" class="modal-stars"></div>
        </div>

        <div id="modalJob" class="review-title"></div>

        <p id="modalText"></p>

        <a id="modalJobLink" class="review-job-link"> View Completed Job → </a>
      </div>
    </div>
    <script src="js/data.js"></script>
    <script src="js/reviews.js"></script>
  </body>
</html>
