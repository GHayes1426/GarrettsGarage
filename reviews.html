<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Garrett's Garage | Reviews</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
        <style>
        :root {
          --red: #C8102E;
          --red-dark: #9B0C23;
          --red-glow: rgba(200,16,46,0.25);
          --black: #080808;
          --surface: #131313;
          --surface2: #1C1C1C;
          --border: #2A2A2A;
          --text: #F0F0F0;
          --text-muted: #888;
          --white: #FFFFFF;
        }
            
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            
        html { scroll-behavior: smooth; }

        body {
          background: var(--black);
          color: var(--text);
          font-family: 'Barlow', sans-serif;
          margin: 0;
          position: relative;
        }

        body::before {
          content: '';
          position: fixed;
          top: 70px;
          left: 0;
          right: 0;
          bottom: 0;

          background:
            repeating-linear-gradient(
              -45deg,
              transparent,
              transparent 70px,
              rgba(200,16,46,.28) 70px,
              rgba(200,16,46,.28) 72px
            );

          mask-image: linear-gradient(
            to bottom,
            rgba(0,0,0,1) 0%,
            rgba(0,0,0,.85) 25%,
            rgba(0,0,0,.45) 60%,
            rgba(0,0,0,0) 100%
          );

          pointer-events: none;
          z-index: 0;
        }
            
        body::after {
          content: '';
          position: fixed;
          top: 70px; /* starts below navbar */
          left: 0;
          right: 0;
          height: 800px;
          background:
            linear-gradient(
              to bottom,
              rgba(200,16,46,0.28) 0%,
              rgba(200,16,46,0.12) 30%,
              rgba(200,16,46,0.04) 60%,
              transparent 100%
            );
          pointer-events: none;
          z-index: 0;
        }
            
        nav {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          z-index: 1000;
          background: #000;
          border-bottom: 1px solid var(--border);
          height: clamp(70px, 8vw, 80px);
          margin: 0;
          border-top: none;
        }
        
        .nav-home {
          display: flex;
          align-items: center;
          padding: 10px 22px;
          border: 1px solid var(--border);
          border-radius: 4px;
          color: var(--text);
          text-decoration: none;
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 700;
          text-transform: uppercase;
          transition: 0.25s ease;
        }

        .nav-home:hover {
          border-color: var(--red);
          color: var(--red);
        }

        .nav-inner {
          max-width: 1280px;
          width: 100%;
          height: 100%;
          margin: 0 auto;
          padding: 0 20px;
          display: flex;
          align-items: center;
        }
            
        .nav-logo {
          display: flex;
          align-items: center;
          height: 100%;
          flex-shrink: 0;
          margin-right: clamp(24px, 4vw, 64px);
        }

        .nav-logo img {
          height: clamp(30px, 4vw, 48px);
          width: auto;
          display: block;
        }

        .nav-links {
          display: flex;
          gap: clamp(16px, 2vw, 36px);
          list-style: none;
          flex: 1;
          justify-content: flex-start;
        }
            
        .nav-links a {
          color: var(--text-muted);
          text-decoration: none;
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 600;
          font-size: clamp(8px, 2vw, 20px);
          letter-spacing: 0.08em;
          text-transform: uppercase;
          transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--red); }

        .nav-links a.active {
          color: var(--red);
        }

        .nav-right {
          margin-left: auto;
          display: flex;
          align-items: center;
          gap: 16px;
        }
            
        .nav-cta {
          background: var(--red);
          color: var(--white);
          padding: 9px 22px;
          border-radius: 3px;
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 700;
          font-size: 15px;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          text-decoration: none;
          transition: background 0.2s;
        }
            
        .nav-cta:hover {
          background: var(--red-dark);
        }

        .container {
          max-width: 1280px;
          margin: 0 auto;
          padding: 0 32px;
        }

        .section-label {
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 700;
          letter-spacing: 0.25em;
          text-transform: uppercase;
          color: var(--text);
          margin-bottom: 16px;
          padding-top: 0;
        }

        #reviews {
          position: relative;
          overflow: hidden;
          padding-top: 0;
          margin-top: 0;
          padding-top: calc(var(--nav-height) + 20px);
          padding-bottom: 80px;
        }
            
        #reviews .container { 
          position: relative;
          z-index: 1;
        }

        .section-title {
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 900;
          font-size: clamp(36px, 5vw, 56px);
          text-transform: uppercase;
          line-height: 1;
          margin-bottom: 16px;
        }

        .section-title span {
          color: var(--red);
        }

        .section-desc {
          color: var(--text);
          max-width: 700px;
          margin-bottom: 20px;
        }

        .reviews-grid {
          display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
          gap: 20px;
        }
          
        .reviews-content {
          max-width: 1000px;
          margin: 0 auto;
        }
          
        .review-card {
          background: var(--surface); border: 1px solid var(--border);
          border-radius: 4px; overflow: hidden;
          transition: all 0.25s; cursor: default;
          position: relative;
        }
        .review-card::before {
          content: ''; position: absolute; top: 0; left: 0; right: 0;
          height: 3px; background: var(--red); transform: scaleX(0);
          transform-origin: left; transition: transform 0.25s;
        }
        .review-card:hover { border-color: var(--red); transform: translateY(-4px); box-shadow: 0 16px 40px rgba(200,16,46,0.15); }
        .review-card:hover::before { transform: scaleX(1); }
        .review-card-body { padding: 28px; }
        .review-cat {
          font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
          color: #FFD700; font-family: 'Barlow Condensed', sans-serif;
          font-weight: 700; margin-bottom: 10px;
        }
        .review-card h3 {
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 800; font-size: 22px; text-transform: uppercase;
          color: var(--white); margin-bottom: 10px;
        }
        .review-card p { color: var(--white); font-style: italic; font-size: 15px; line-height: 1.7; margin-bottom: 16px; }
        .review-price {
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 700; font-size: 20px; color: var(--white);
        }
        .review-price span { font-size: 13px; color: var(--text-muted); font-weight: 400; }
          
        .review-header {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          gap: 16px;
          margin-bottom: 16px;
        }

        .review-meta {
          color: var(--text-muted);
          font-size: 14px;
          margin-top: 4px;
        }

        .review-card h3 {
          margin-bottom: 0;
        }
          
        .review-search {
          flex: 1;
          min-width: 250px;
          background: var(--surface);
          border: 1px solid var(--border);
          color: var(--white);
          padding: 10px 14px;
          border-radius: 4px;
          font-family: 'Barlow', sans-serif;
        }

        .review-search:focus {
          outline: none;
          border-color: var(--red);
        }

        #ratingFilter {
          min-width: 160px;
        }
          
        .review-title {
          color: var(--red);
          font-family: 'Barlow Condensed', sans-serif;
          font-weight: 700;
          font-size: 20px;
          text-transform: uppercase;
          margin-bottom: 12px;
        }
          
        .filter-bar {
          display: flex;
          gap: 12px;
          flex-wrap: wrap;
          margin-bottom: 40px;
        }

        .filter-btn {
          background: var(--surface);
          border: 1px solid var(--border);
          color: var(--white);
          padding: 8px 16px;
        }
          
        .review-controls {
          display: flex;
          align-items: center;
          gap: 20px;
          flex-wrap: wrap;
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 4px;
          padding: 20px 24px;
          margin-bottom: 32px;
          box-shadow: 0 8px 24px rgba(0,0,0,.15);
        }
          
        .rating-filter {
          display: flex;
          gap: 4px;
        }

        .filter-star {
          color: #555;
          font-size: 28px;
          cursor: pointer;
          transition: .2s;
        }

        .filter-star.hover,
        .filter-star.hovered,
        .filter-star.active {
          color: var(--red);
        }
          
        /* Mobile Burger */

      .burger {
        width: 32px;
        height: 24px;
        position: relative;
        z-index: 1002;
        display: none;
        flex-direction: column;
        justify-content: space-between;
        margin-left: auto;
        background: none;
        border: none;
        cursor: pointer;
      }

      .burger span {
        display: block;
        width: 100%;
        height: 3px;
        background: white;
        border-radius: 3px;
        transition: all 0.3s ease;
      }

      .burger.open span:nth-child(1) {
        transform: translateY(10.8px) rotate(45deg);
      }

      .burger.open span:nth-child(2) {
        opacity: 0;
      }

      .burger.open span:nth-child(3) {
        transform: translateY(-10.8px) rotate(-45deg);
      }

      /* Mobile Menu */

      .mobile-menu {
        position: fixed;
        top: var(--nav-height);
        left: 0;
        right: 0;
        height: 48px;
        display: flex;
        flex-direction: row;
        background: #56000e;
        z-index: 999;
        overflow: hidden;
        max-height: 0;
        opacity: 0;
        transition:
          max-height 0.3s ease,
          opacity 0.3s ease;
      }

      .mobile-menu.open {
        max-height: 48px;
        opacity: 1;
      }

      .mobile-menu a {
        flex: 1;
        padding: 12px 6px;
        color: white;
        text-decoration: none;
        text-align: center;
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        border: 1px solid #000;
        transition: background 0.25s ease;
      }

      .mobile-menu a:last-child {
        border-right: none;
      }

      .mobile-menu a:hover {
        background: #991229;
      }

      /* Floating Book Service Button */

      .floating-book-btn {
        position: fixed;
        top: calc(var(--nav-height) + 48px);
        right: 0;
        z-index: 998;

        display: flex;
        align-items: center;
        justify-content: center;

        min-height: 48px;
        padding: 12px 22px;

        background: var(--red);
        color: #fff;
        text-decoration: none;

        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.08em;
        text-transform: uppercase;

        border: 1px solid rgba(255,255,255,0.15);
        border-top: none;
        border-radius: 0 0 4px 4px;

        box-shadow: 0 4px 12px rgba(0,0,0,.3);

        transition:
          top 0.3s ease,
          right 0.3s ease,
          background 0.25s ease,
          transform 0.25s ease;
      }

      .floating-book-btn:hover {
        background: var(--white);
        border-color: var(--red-dark);
        color: var(--red);
      }

      @media (max-width: 800px) {
        nav .nav-links {
          display: none;
        }

        .burger {
          display: flex;
        }
      }
    </style>
  </head>
<body>

<nav>
  <div class="nav-inner">

    <a href="index.html" class="nav-logo">
      <img src="images/banner.png" alt="Garrett's Garage">
    </a>

    <ul class="nav-links">
      <li><a href="/index.html">About</a></li>
      <li><a href="/services.html">Services</a></li>
      <li><a href="/reviews.html" class="active">Reviews</a></li>
      <li><a href="/index.html#jobs">Completed Jobs</a></li>
      <li><a href="/index.html#schedule">Contact</a></li>
    </ul>

    <button class="burger" id="burger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</nav>
  
<a href="/index.html#schedule" class="floating-book-btn">
    Book Service
</a>

<div class="mobile-menu" id="mobileMenu">
  <a href="/index.html">About</a>
  <a href="/services.html">Services</a>
  <a href="/reviews.html" class="active">Reviews</a>
  <a href="/index.html#jobs">Past jobs</a>
  <a href="/index.html#schedule">Contact</a>
</div>
    
<!-- reviews -->
<section id="reviews">
  <div class="container">
    <div class="section-label">What They're Saying</div>
    <div class="section-title">Our <span>Reviews</span></div>
    <p class="section-desc">See what our previous customers think about our professional services</p>
    <div class="reviews-content">
      <div class="review-controls">
        <div class="rating-filter" id="ratingFilter">
          <span class="filter-star" data-rating="1">★</span>
          <span class="filter-star" data-rating="2">★</span>
          <span class="filter-star" data-rating="3">★</span>
          <span class="filter-star" data-rating="4">★</span>
          <span class="filter-star" data-rating="5">★</span>
        </div>
        <input
          type="text"
          id="reviewSearch"
          placeholder="Search reviews..."
          class="review-search"
        >
      </div>
        <div class="reviews-grid" id="reviewsGrid">
      </div>
    </div>
  </div>
</section>
<script>

let selectedRating = null;

const reviews = [
  {
    title: "Saved My Accord",
    name: "Marcus T.",
    vehicle: "2018 Honda Accord",
    stars: 5,
    text: "Garrett completely rebuilt my engine and had me back on the road in just a few days. The car runs better than it ever has.",
    service: "Engine Rebuild"
  },
  {
    title: "Transmission Feels Brand New",
    name: "Priya K.",
    vehicle: "2020 Acura MDX",
    stars: 4,
    text: "My MDX had a terrifying transmission shudder. Garrett diagnosed it immediately and fixed the issue.",
    service: "Transmission Rebuild"
  },
  {
    title: "Transmission Feels Brand New",
    name: "Priya K.",
    vehicle: "2020 Acura MDX",
    stars: 3,
    text: "My MDX had a terrifying transmission shudder. Garrett diagnosed it immediately and fixed the issue.",
    service: "Transmission Rebuild"
  },
  {
    title: "Transmission Feels Brand New",
    name: "Priya K.",
    vehicle: "2020 Acura MDX",
    stars: 2,
    text: "My MDX had a terrifying transmission shudder. Garrett diagnosed it immediately and fixed the issue.",
    service: "Transmission Rebuild"
  },
  {
    title: "Transmission Feels Brand New",
    name: "Priya K.",
    vehicle: "2020 Acura MDX",
    stars: 1,
    text: "My MDX had a terrifying transmission shudder. Garrett diagnosed it immediately and fixed the issue.",
    service: "Transmission Rebuild"
  }
];

// ── RENDER REVIEWS ──
function renderReviews() {

  const search =
    document.getElementById('reviewSearch')?.value
      .toLowerCase()
      .trim() || '';

  let filtered = reviews;

  // Star filter
  if (selectedRating !== null) {
    filtered = filtered.filter(
      r => r.stars === selectedRating
    );
  }

  // Search filter
  if (search) {
    filtered = filtered.filter(r =>
      (
        r.title +
        ' ' +
        r.text +
        ' ' +
        r.vehicle +
        ' ' +
        r.service +
        ' ' +
        r.name
      )
        .toLowerCase()
        .includes(search)
    );
  }

  document.getElementById('reviewsGrid').innerHTML =
    filtered.map(r => `
      <div class="review-card">
        <div class="review-card-body">

          <div class="review-header">
            <div>
              <h3>${r.name}</h3>
              <div class="review-meta">
                ${r.vehicle} • ${r.service}
              </div>
            </div>

            <div class="review-cat">
              ${"★".repeat(r.stars)}
            </div>
          </div>

          <div class="review-title">
            ${r.title}
          </div>

          <p>"${r.text}"</p>

        </div>
      </div>
    `).join('');
}

function updateNavOffsets() {
  const nav = document.querySelector('nav');
  const menu = document.getElementById('mobileMenu');
  const bookBtn = document.querySelector('.floating-book-btn');

  const navHeight = nav.getBoundingClientRect().height;

  document.documentElement.style.setProperty(
    '--nav-height',
    `${navHeight}px`
  );

  const menuHeight =
    menu.classList.contains('open')
      ? menu.getBoundingClientRect().height
      : 0;

  bookBtn.style.top = `${navHeight + menuHeight}px`;
}

window.addEventListener('load', updateNavOffsets);

window.addEventListener('resize', () => {
  updateNavOffsets();

  if (window.innerWidth > 900) {
    document.getElementById('mobileMenu').classList.remove('open');
    document.getElementById('burger').classList.remove('open');
  }
});

document.querySelectorAll('#mobileMenu a').forEach(link => {
  link.addEventListener('click', () => {
    const menu = document.getElementById('mobileMenu');
    const burger = document.getElementById('burger');

    menu.classList.remove('open');
    burger.classList.remove('open');

    updateNavOffsets();
  });
});

function toggleMenu() {
  const menu = document.getElementById('mobileMenu');
  const burger = document.getElementById('burger');

  menu.classList.toggle('open');
  burger.classList.toggle('open');

  updateNavOffsets();
}

// Search
document
  .getElementById('reviewSearch')
  .addEventListener('input', renderReviews);

// Star Filter
const stars = document.querySelectorAll('.filter-star');

stars.forEach(star => {

  star.addEventListener('mouseenter', () => {

    const rating = Number(star.dataset.rating);

    stars.forEach(s => {
      s.classList.toggle(
        'hovered',
        Number(s.dataset.rating) <= rating
      );
    });

  });

  star.addEventListener('mouseleave', () => {

    stars.forEach(s => s.classList.remove('hovered'));

  });

  star.addEventListener('click', () => {

  const clickedRating = Number(star.dataset.rating);

  // If already selected, clear filter
  if (selectedRating === clickedRating) {

    selectedRating = null;

    stars.forEach(s => {
      s.classList.remove('active');
    });

  } else {

    selectedRating = clickedRating;

    stars.forEach(s => {
      s.classList.toggle(
        'active',
        Number(s.dataset.rating) <= selectedRating
      );
    });

  }

  renderReviews();

});

});

// Initial render
renderReviews();

</script>
</body>
</html>
